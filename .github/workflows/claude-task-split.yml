name: task-split-agent

on:
  issues:
    types: [labeled]

jobs:
  task-split:
    if: github.event.label.name == 'タスク分割'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # blocked チェック
      - name: Check blocked
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LABELS=$(gh issue view ${{ github.event.issue.number }} --json labels --jq '.labels[].name')
          if echo "$LABELS" | grep -q "^blocked$"; then
            echo "Issue is blocked. Skipping."
            echo "BLOCKED=true" >> $GITHUB_ENV
          fi

      # in-task-split に遷移
      - name: Transition to in-task-split
        if: env.BLOCKED != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --remove-label "タスク分割" \
            --add-label "in-task-split"

      # Claude Code Action でタスク分割を実行
      - name: Run Claude Code Task Split
        if: env.BLOCKED != 'true'
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: |
            あなたはタスク分割エージェントです。以下の Issue の設計書を読み、実装可能な粒度まで作業単位を分割してください。

            Issue: #${{ github.event.issue.number }}
            タイトル: ${{ github.event.issue.title }}
            本文:
            ${{ github.event.issue.body }}

            手順:
            1. `docs/${{ github.event.issue.number }}-design.md` が存在する場合は必ず参照する
            2. 設計書の「作業分割方針」に従い、1エージェントが1 PR で完結できる単位にタスクを分割する
            3. 各タスクについて、以下のフォーマットで子 Issue を `gh issue create` コマンドで起票する:

            子 Issue フォーマット:
            タイトル: [子タスク] <タスクの概要>
            本文:
            ```
            ## 概要
            （タスクの説明）

            ## 親 Issue
            #${{ github.event.issue.number }}

            ## 実装方針
            （設計書から抜粋）

            ## 完了条件
            （具体的な完了基準）
            ```

            4. 各子 Issue に `ready-for-impl` ラベルを付与する:
               `gh issue edit <issue-number> --add-label "ready-for-impl"`
            5. 親 Issue (#${{ github.event.issue.number }}) に分割完了コメントを投稿する:
               `gh issue comment ${{ github.event.issue.number }} --body "## ✅ タスク分割完了\n\n以下の子 Issue を作成しました:\n- #<番号1>: <タイトル1>\n..."`
            6. 親 Issue の `in-task-split` ラベルを除去する:
               `gh issue edit ${{ github.event.issue.number }} --remove-label "in-task-split"`

            重要:
            - 設計書がない場合は Issue 本文の情報のみでタスク分割を行う
            - 1タスクの粒度は「1エージェントが1 PR で完結できる単位」とする
            - タスクは小さくしすぎず、かつ大きすぎないようにする
            - 最後に必ず親 Issue の in-task-split ラベルを除去すること

      # 失敗時: in-task-split 除去・blocked 付与・コメント
      - name: Handle failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --remove-label "in-task-split" \
            --add-label "blocked" || true
          gh issue comment ${{ github.event.issue.number }} --body "## ⚠️ エージェント処理失敗

          **エージェント**：タスク分割エージェント
          **エラー内容**：ワークフロー実行中にエラーが発生しました。GitHub Actions のログを確認してください。
          **次のアクション**：人間による確認・対応が必要です"
