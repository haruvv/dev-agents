name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  actionlint:
    name: ワークフロー構文チェック
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)

      - name: Run actionlint
        run: ./actionlint -color .github/workflows/*.yml

  architecture-check:
    name: アーキテクチャ制約チェック
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/check-*.sh

      - name: ファイル配置ルールチェック
        run: scripts/check-placement.sh

      - name: レイヤ逆流チェック
        run: scripts/check-layer.sh

      - name: ドメイン境界チェック
        run: scripts/check-domain-boundary.sh

      - name: 境界バリデーションチェック
        run: scripts/check-boundary-validation.sh

  # TODO(ISSUE-10b): src/ の技術スタックが決まったタイミングで以下を追加する
