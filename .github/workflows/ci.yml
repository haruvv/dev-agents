name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  checks: write
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-check
          fail_level: error
